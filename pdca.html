<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>マイチャンネルPDCA</title><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Hiragino Sans',sans-serif;background:#eef1f5;color:#16202b}
.hd{background:#ffffff;border-bottom:1px solid #d5dee8;padding:14px 24px;position:sticky;top:0;z-index:300;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hd h1{font-size:16px;color:#101a24;font-weight:700}
.hd .meta{font-size:11px;color:#6b7c8d;margin-top:2px}
.btns{display:flex;gap:5px;flex-wrap:wrap}
.btn{background:#eef2f6;color:#1a5cae;border:1px solid #bcd0e4;padding:5px 11px;border-radius:5px;cursor:pointer;font-size:11px}
.btn:hover{background:#e2e9f1}
.sb{background:#f4f7fa;border-bottom:1px solid #dbe3ea;padding:10px 24px;position:sticky;top:53px;z-index:200;display:flex;align-items:center;gap:8px}
.sb input{flex:1;background:#ffffff;border:1px solid #ccd7e2;color:#16202b;padding:7px 13px;border-radius:6px;font-size:13px;outline:none}
.sb input:focus{border-color:#3b82f6}
.sb input::placeholder{color:#9aabbc}
.sc{font-size:11px;color:#6b7c8d;min-width:70px;white-space:nowrap}
.hd-select{background:#eef2f6;color:#1a5cae;border:1px solid #bcd0e4;padding:5px 9px;border-radius:5px;cursor:pointer;font-size:11px;outline:none;color-scheme:light}
.hd-select:hover{background:#e2e9f1}
.hd-date{background:#eef2f6;color:#33465a;border:1px solid #bcd0e4;padding:4px 7px;border-radius:5px;font-size:11px;color-scheme:light;outline:none}
.hd-left{display:flex;align-items:center;gap:14px}
.hamburger{background:none;border:none;color:#33465a;font-size:22px;cursor:pointer;padding:3px 9px;border-radius:6px;line-height:1}
.hamburger:hover{background:#e2e9f1;color:#101a24}
/* 📂 カテゴリージャンプ サイドバー */
.sidebar-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:600}
.sidebar-ov.open{display:block}
.sidebar{position:fixed;top:0;left:0;width:300px;max-width:82vw;height:100vh;background:#ffffff;border-right:1px solid #d5dee8;z-index:601;transform:translateX(-100%);transition:transform .22s ease;overflow-y:auto;padding-bottom:30px}
.sidebar.open{transform:translateX(0)}
.sidebar-head{font-size:14px;font-weight:800;color:#101a24;padding:16px 18px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#ffffff;border-bottom:1px solid #dbe4ee}
.sidebar-close{cursor:pointer;color:#5a6b7c;font-size:16px;padding:0 4px}
.sidebar-close:hover{color:#101a24}
.side-group-title{font-size:10px;color:#5f7183;text-transform:uppercase;letter-spacing:1px;padding:14px 18px 5px}
.side-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 18px;color:#33465a;font-size:13px;cursor:pointer;transition:background .12s}
.side-item:hover{background:#e2e9f1;color:#101a24}
.side-item.side-all{color:#1a5cae;font-weight:700;border-bottom:1px solid #dbe4ee;padding:11px 18px}
.side-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-cnt{font-size:11px;color:#5f7183;background:#eef2f6;border:1px solid #d5dee8;border-radius:9px;padding:1px 7px;flex-shrink:0}
.side-app{font-weight:700;color:#1a5cae;margin-top:3px}
.side-sub{padding-left:34px;font-size:12px;color:#55677a}
.side-sub .side-name{position:relative}
.side-sub .side-name::before{content:'└ ';color:#93a5b7}
#period-custom{font-size:11px;color:#5a6b7c;display:inline-flex;align-items:center;gap:4px}
.sc.hit{color:#1d6fd6}.sc.miss{color:#ef6a6a}
.sbtn{background:none;border:1px solid #ccd7e2;color:#5f7284;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:11px}
.sbtn:hover{color:#33465a;border-color:#9db9d6}
.toc{background:#f7f9fb;padding:12px 24px;border-bottom:1px solid #dde5ec;display:flex;flex-wrap:wrap;gap:5px}
.toc a{color:#5a6e82;font-size:12px;text-decoration:none;background:#eef2f6;border:1px solid #d5dee8;padding:3px 10px;border-radius:12px}
.toc a:hover{color:#101a24;background:#e2e9f1}
.cs{border-bottom:1px solid #d8e2ec}
.ch{background:#ffffff;padding:13px 24px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-left:3px solid var(--ac,#3b82f6)}
.ch:hover{background:#eef2f6}
.ct{font-size:14px;font-weight:600;color:#101a24}
.cd{font-size:11px;color:#5a6b7c;margin-top:2px}
.cc{font-size:11px;color:#9aabbc;background:#e6edf5;padding:2px 8px;border-radius:10px}
.cv{color:#9aabbc;font-size:13px;margin-left:8px;transition:transform .2s}
.cb{display:none;padding:18px 24px}
.cb.open{display:block}
.vg{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.card{background:#ffffff;border:1px solid #c8d4e0;border-radius:8px;overflow:hidden}
.card.hidden{display:none}
.card img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;cursor:pointer;transition:opacity .15s}
.card img:hover{opacity:.85}
.cdb{padding:11px}
.cdtitle{font-size:13px;font-weight:600;line-height:1.5;margin-bottom:6px}
a.tl{color:#0d161f;text-decoration:none}
a.tl:hover{color:#1a5cae;text-decoration:underline}
.cdmeta{display:flex;flex-wrap:wrap;gap:7px;font-size:11px;color:#3d4d5d;margin-bottom:7px;align-items:center}
.views{color:#e2680a;font-weight:800}
/* 再生数の5段階サイズ（絶対再生数: 〜1万 / 〜10万 / 〜30万 / 〜100万 / 100万〜） */
.views.vt1{font-size:11px}
.views.vt2{font-size:12.5px}
.views.vt3{font-size:14.5px}
.views.vt4{font-size:16.5px}
.views.vt5{font-size:19px}
/* チャンネルパワーバッジ（vidIQ風: ch中央値比×・登録者比%）— メタ行右端に表示 */
.pow{display:inline-flex;align-items:center;gap:5px;background:#ffffff;border:1px solid #c9d5e2;border-radius:6px;padding:1px 7px;font-size:11.5px;font-weight:800;line-height:1.5;cursor:help;white-space:nowrap}
.pow small{font-size:9px;font-weight:600;color:#5a6b7c;white-space:nowrap}
/* 🔗 動画リンクコピー（登録者比バッジの左） */
.copy-link{margin-left:auto;background:#ffffff;border:1px solid #c9d5e2;border-radius:6px;padding:1px 7px;font-size:11px;cursor:pointer;line-height:1.5}
.copy-link:hover{background:#eef4fb;border-color:#8fb4dc}
/* サムネ右クリックコピーのトースト通知 */
#copy-toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(8px);background:#1d3557;color:#fff;padding:10px 20px;border-radius:8px;z-index:999;font-size:13px;box-shadow:0 4px 18px rgba(10,30,60,.3);opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;max-width:90vw}
#copy-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* 高倍率カード（紺が濃い）は白文字に反転して可読性を保つ */
.card.heat-hi a.tl{color:#ffffff}
.card.heat-hi .cdmeta{color:#d9e6f4}
.card.heat-hi .views{color:#ffa645}
.card.heat-hi .cdmeta .ch2{background:rgba(255,255,255,.14);color:#e8f1fb}
.card.heat-hi .cdmeta a.ch2-link{background:rgba(255,255,255,.14);color:#bcdcff}
.card.heat-hi .thumb-text{color:#e9f2fc;background:rgba(8,22,44,.4);border-color:rgba(255,255,255,.25)}
.card.heat-hi .thumb-empty{color:#9fb8d2}
.card.heat-hi .tb{background:rgba(8,22,44,.45);border-color:rgba(255,255,255,.22);color:#c8daec}
.card.heat-hi .tc{background:rgba(8,22,44,.5);color:#dbe7f3;border-left-color:rgba(255,255,255,.3)}
.card.heat-hi .cat-btn{border-color:rgba(255,255,255,.32);color:#c8daec}
.card.heat-hi .cat-btn:hover{background:rgba(255,255,255,.1);color:#ffffff}
.card.heat-hi .pow,.card.heat-hi .copy-link{background:#ffffff;border-color:#ffffff}
.pow-hot{color:#d63c2a;border-color:#f0b3ab}
.pow-up{color:#b26a00;border-color:#ecd0a0}
.pow-mid{color:#1d6fd6;border-color:#bcd4f0}
.pow-low{color:#6b7c8d;border-color:#d0dae4}
.pow-chip{font-weight:800;border-radius:5px;padding:0 5px;background:#ffffff;border:1px solid #d0dae4;cursor:help}
.ch2{background:#e9eff6;padding:2px 6px;border-radius:3px;color:#42556a}
a.ch2-link{text-decoration:none;cursor:pointer;transition:all .15s;color:#1d5da8}
a.ch2-link:hover{background:#dcebfa;color:#0f4a90}
/* 字幕トグル */
.thumb-text-wrap{margin-bottom:6px}
.thumb-text{font-size:11px;color:#1d3a5a;background:#f0f5fa;border:1px solid #cfdce8;border-radius:4px;padding:4px 8px;line-height:1.6;user-select:text;cursor:text;transition:border-color .15s}
.thumb-text:hover{border-color:#3b82f6;background:#e8f1fa}
.thumb-empty{color:#8ba0b5;font-style:italic}
.thumb-text-editing{display:none}
.thumb-edit-area{width:100%;background:#ffffff;border:1px solid #3b82f6;color:#2c4258;padding:5px 8px;border-radius:4px;font-size:11px;line-height:1.6;resize:vertical;min-height:48px;outline:none;font-family:inherit}
.thumb-edit-btns{display:flex;gap:5px;margin-top:4px}
.thumb-save-btn{background:#1d4ed8;color:#fff;border:1px solid #2563eb;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px}
.thumb-save-btn:hover{background:#2563eb}
.thumb-cancel-btn{background:none;color:#5f7284;border:1px solid #ccd7e2;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px}
.thumb-cancel-btn:hover{color:#33465a;border-color:#9db9d6}
.tb{width:100%;background:#f4f7fa;border:1px solid #cdd9e4;color:#3a4a58;padding:7px 12px;border-radius:6px;cursor:pointer;font-size:12px;text-align:left;display:flex;justify-content:space-between;align-items:center;margin-bottom:0;transition:background .15s,color .15s}
.light-watch{display:block;text-align:center;text-decoration:none;color:#1a5cae;background:#ffffff;border:1px solid #ccd7e2;padding:7px 12px;border-radius:6px;font-size:11px}
.light-watch:hover{background:#e9eef4;border-color:#9db9d6}
.tb:hover:not([disabled]){background:#e9eef4;color:#33465a;border-color:#9db9d6}
.tb[disabled]{opacity:.35;cursor:default}
.arr{transition:transform .2s;display:inline-block}
.tb.open .arr{transform:rotate(180deg)}
/* 字幕本文 */
.tc{display:none;margin-top:6px;font-size:12px;color:#2a3745;line-height:1.85;background:#f6f8fb;padding:10px;border-radius:5px;border-left:2px solid #b9cbdd;max-height:500px;overflow-y:auto}
.tc-copy{background:#e3edf8;color:#1a5cae;border:1px solid #bcd0e4;padding:4px 11px;border-radius:5px;cursor:pointer;font-size:11px;margin-bottom:8px;display:inline-block;position:sticky;top:0}
.tc-copy:hover{background:#d3e4f7}
.btn-copyall{background:#e3edf8!important;color:#1a5cae!important;border-color:#9db9d6!important;font-weight:700}
.btn-copyall:hover{background:#d3e4f7!important}
.tc.open{display:block}
.tc.no-t{color:#93a5b7;font-style:italic}
/* カテゴリ変更ボタン */
.cat-btn{margin-top:7px;width:100%;background:none;border:1px dashed #bcc9d6;color:#5a6b7a;padding:5px;border-radius:5px;cursor:pointer;font-size:11px;text-align:center}
/* 操作メニュー（プルダウン集約でカードをコンパクトに） */
.act-toggle{margin-top:5px;padding:3px;font-size:10.5px}
.act-menu{display:none}
.act-menu.open{display:block}
.act-menu .cat-btn{margin-top:4px;padding:4px}
.act-menu .thumb-text-wrap{margin:6px 0}
.act-menu .tb{margin-top:2px}
.cat-btn:hover{background:#eef3f8;color:#33475c;border-color:#8fa9c4}
.reason-box{margin-top:7px}
.reason-ta{width:100%;min-height:72px;background:#ffffff;border:1px solid #ccd7e2;color:#16202b;border-radius:5px;padding:7px;font-size:12px;line-height:1.6;resize:vertical;outline:none;box-sizing:border-box}
.reason-ta:focus{border-color:#3b82f6}
.cat-btn.has-reason{border-style:solid;border-color:#2f5fa0;color:#1a5cae}
/* カテゴリ変更モーダル */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,25,40,.45);z-index:500;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#ffffff;border:1px solid #ccd7e2;border-radius:10px;padding:20px;width:360px;max-width:90vw;max-height:80vh;overflow-y:auto}
.modal h3{font-size:14px;color:#101a24;margin-bottom:4px}
.modal .sub{font-size:11px;color:#5a6b7c;margin-bottom:14px}
.cat-option{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:#33465a;border:1px solid transparent}
.cat-option:hover{background:#eef2f6;border-color:#9db9d6}
.cat-option.current{border-color:#3b82f6;color:#1a5cae;background:#e3edf8}
.modal-close{margin-top:12px;width:100%;background:#eef2f6;border:none;color:#55677a;padding:8px;border-radius:6px;cursor:pointer;font-size:12px}
.modal-close:hover{background:#ccd7e2}
/* 詳細モーダル（どのカテゴリーからでも字幕・サムネを見る） */
.dt-modal{width:580px}
.dt-thumb{width:100%;border-radius:8px;cursor:pointer;margin:6px 0 8px;display:block}
.dt-thumbtext{font-size:12px;color:#55677a;margin-bottom:10px;line-height:1.6}
.dt-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.dt-btn{background:#e9eef4;border:1px solid #b9cde0;color:#2c4258;padding:7px 12px;border-radius:6px;font-size:12px;cursor:pointer;text-decoration:none;display:inline-block}
.dt-btn:hover{background:#dce8f5;border-color:#3b82f6}
.dt-btn.sm{padding:4px 9px;font-size:11px}
.dt-tc-head{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#55677a;margin-bottom:6px}
.dt-tc{font-size:12.5px;line-height:1.85;color:#2a3a4a;white-space:pre-wrap;background:#f7f9fb;border:1px solid #d7e0ea;border-radius:8px;padding:12px;max-height:42vh;overflow-y:auto}
/* ➕ 競合チャンネル追加 */
.btn-addch{background:#fff3e0!important;color:#b45309!important;border-color:#f0c489!important;font-weight:700}
.btn-addch:hover{background:#ffe9c7!important}
.addch-modal{width:600px}
.addch-bar{display:flex;gap:8px;margin:10px 0}
.addch-bar input{flex:1;background:#ffffff;border:1px solid #bcd0e4;color:#16202b;padding:9px 12px;border-radius:7px;font-size:13px;outline:none}
.addch-status{font-size:12px;color:#55677a;min-height:18px;margin-bottom:8px}
.addch-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 10px;background:#f4f7fa;border:1px solid #d7e0ea;border-radius:6px;margin-bottom:6px;font-size:12.5px;color:#2a3a4a}
.addch-h{color:#1a5cae}
.addch-del{background:none;border:1px solid #ecc8c5;color:#c04b5e;padding:3px 9px;border-radius:5px;cursor:pointer;font-size:11px}
.addch-empty{font-size:12px;color:#6b7c8d;padding:8px 0}
.addch-cmd-head{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:#55677a;margin:12px 0 6px}
.addch-cmd{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#157347;background:#f7f9fb;border:1px solid #d7e0ea;border-radius:7px;padding:10px 12px;white-space:pre-wrap;word-break:break-all;min-height:18px}
.addch-ingest-btn{display:block;width:100%;text-align:center;margin:10px 0 4px;background:#e6f6ec!important;border-color:#59b884!important;color:#157347!important;font-weight:700;padding:11px}
.addch-ingest-btn:hover{background:#d7efe1!important;border-color:#2f9e63!important}
.override-badge{display:inline-block;font-size:10px;color:#1a5cae;background:#e3edf8;border:1px solid #bcd0e4;padding:1px 5px;border-radius:3px;margin-left:5px;vertical-align:middle}
/* チャンネルフィルター */
.ch-filter-bar{background:#f5f7fa;border-bottom:1px solid #dde5ec;padding:10px 24px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.ch-filter-label{font-size:11px;color:#6b7c8d;margin-right:4px;white-space:nowrap}
.ch-chip{background:#eef2f6;border:1px solid #d5dee8;color:#5a6e82;font-size:11px;padding:3px 10px;border-radius:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.ch-chip:hover{background:#e2e9f1;color:#33465a;border-color:#9db9d6}
.ch-chip.active{background:#e3edf8;color:#1a5cae;border-color:#9db9d6;font-weight:600}
.ch-chip .cnt{font-size:10px;color:#6b7c8d;margin-left:3px}
.ch-chip.active .cnt{color:#1d6fd6}
/* 📺 チャンネル一覧（カード型・最上部） */
.chan-section{background:#f7f9fb;border-bottom:2px solid #d3deea}
.chan-headbar{padding:13px 24px 4px}
.chan-title{font-size:16px;font-weight:800;color:#1d5da8}
.chan-sub{font-size:11px;color:#5f7183;margin-left:12px}
.chan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(212px,1fr));gap:10px;padding:14px 24px}
.chan-card{background:#ffffff;border:1px solid #d5dfe9;border-radius:8px;padding:11px 13px;cursor:pointer;transition:all .15s;position:relative}
.chan-del{position:absolute;top:5px;right:5px;background:none;border:1px solid transparent;border-radius:6px;font-size:12px;line-height:1;padding:4px 6px;cursor:pointer;opacity:0;transition:opacity .15s;filter:grayscale(1)}
.chan-card:hover .chan-del{opacity:.65}
.chan-del:hover{opacity:1!important;filter:none;border-color:#ecc8c5;background:#fdecea}
.chan-del:disabled{opacity:.5;cursor:default}
.chan-card:hover{border-color:#9db9d6;background:#f0f5fb}
.chan-card.active{border-color:#2563eb;background:#e3edf8;box-shadow:0 0 0 1px #1d4ed8 inset}
.chan-name{font-size:13px;font-weight:700;color:#16222e;line-height:1.4;margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chan-stats{display:flex;flex-wrap:wrap;gap:9px;align-items:baseline;font-size:11px;color:#5f7284}
.chan-stats b{font-size:15px;color:#1d5da8;font-weight:800}
/* セクション開閉トグル（ランキング/検索） */
.sec-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.sec-head:hover{background:rgba(0,0,0,.03)}
.sec-toggle{font-size:12px;color:#1a5cae;background:#e3edf8;border:1px solid #bcd0e4;padding:4px 12px;border-radius:6px;white-space:nowrap;margin-right:24px}
.trend-collapse.collapsed,.srch-collapse.collapsed{display:none}
/* 📊 カテゴリー別 / 📲 アプリ別 グループ（折りたたみ） */
.cat-group{border-bottom:2px solid #cfdbe7}
.cat-group-head{padding:14px 24px;background:#ffffff;border-bottom:1px solid #dde6ef}
.cat-group-head:hover{background:#f2f7fc}
.cat-group-title{font-size:16px;font-weight:800;color:#134a8e}
.cat-group-sub{font-size:11px;color:#5a6e82;margin-left:12px}
.cat-group-body.collapsed{display:none}
.sub-cs{margin:0 0 6px 0}
.sub-ch{background:#f3f6fa!important;border-left-width:2px!important}
.sub-ch:hover{background:#e9eff6!important}
.sub-cs .cb{padding:12px 16px}
.cs.search-empty .ch{opacity:.25;pointer-events:none}
.cs.search-empty .cb{display:none!important}
/* カスタムカテゴリ作成UI */
.new-cat-bar{background:#f7f9fb;border-bottom:1px solid #dde5ec;padding:10px 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.new-cat-bar span{font-size:12px;color:#6b7c8d}
.new-cat-bar input{background:#eef2f6;border:1px solid #ccd7e2;color:#16202b;padding:6px 10px;border-radius:5px;font-size:12px;outline:none;width:200px}
.new-cat-bar input:focus{border-color:#3b82f6}
.new-cat-bar input::placeholder{color:#9aabbc}
.add-cat-btn{background:#e3edf8;color:#1a5cae;border:1px solid #bcd0e4;padding:5px 12px;border-radius:5px;cursor:pointer;font-size:12px}
.add-cat-btn:hover{background:#d3e4f7}
.cs.custom .ch{border-left-color:#3b82f6}

,858回視聴　2026/05/23\n【Google】知らないと超危険！GoogleアプリとChromeアプリの違いを徹底解説\n103,573回視聴　2026/06/12\n×30　登録者比 1,459%\n【警告】GoogleとChromeの違い！間違えると高額請求の危険\n411,295回視聴　2026/06/26\n×153\n「私はロボットではありません」を何となく押していませんか？実は詐欺の可能性があります。　#reCAPTCHA　#リキャプチャ\n214,643回視聴　2026/02/23\n×20　登録者比 509%\n【9割が騙される】「私はロボットではありません」を悪用した詐欺で、知らぬ間にスマホ料金が高額に…。対策方法を知っておいて！\n475,858回視聴　2026/05/23\n【Android】画面内のQRコードを読み取る方法！\n1,703,564回視聴　2024/07/31\n×15　登録者比 3,442%\n【いまさら聞けない】画面内のQRコード読み取れる？簡単な読み取り方法の紹介！\n864,264回視聴　2024/08/29\n×3.7　登録者比 168%\n【警告】GoogleとChromeの違い！間違えると高額請求の危険\n411,295回視聴　2026/06/26\n×153"}, {"doc_heading": "企画8　充電2倍", "title": "", "thumb_copy": "", "target": "", "script": "", "feedback": "スマホの充電泥棒\n(LINEのアイコン)LINEでした\nここ押すだけで\n充電2倍長持ちする\n実は、充電がすぐ減る原因\n（LINEのアイコン）LINEのココ→\n無駄すぎる設定をオフ！"}, {"doc_heading": "企画7　7月20日までに台本完成させる", "title": "", "thumb_copy": "市場としては、『突然の規約変更』という訴求が溢れすぎて「突然感」がもはや無くなってしまっている\n今回の企画であったり、すでに由美子で企画した「違法になりました」など、視聴者はそのジャンルにないような訴求（以前までなかった『規約変更』）orトレンド訴求（タイトルの『7月30日まで』など）をクリックしがちなことがわかるので少し切り口を変えればまだ伸びる余白はあると考えられる\n例えば以下の「7月30日から勝手に同意など」\n（グーグルロゴ）7月30日から\n勝手に同意…\n拒否するとどうなる\n（グーグルロゴ）7月30日から\n勝手に同意…\n対応しないとどうなる\n→埼玉スマホ教室の「自分が知らない間に、すでに話が進んでいる」という置いてかれてる感に加えて、時事ネタに具体的な日にちを入れて締め切り感+「勝手に同意」の怒りや無力感でクリックを誘発\n企画の内容としてOK\nそれを踏まえた上で気になったこと\n埼玉スマホ教室は登録者パワーがでかいことを念頭におく\nともやん状態だと思った方がよくて\nそこまで強い訴求をしなくても一定数、重要を抑えていればある程度は伸ばせる\n↓\nつまり後発はより強い訴求にしないと見られない\n↓投稿する次の日の日付に変更する↓\n7月30日から\n勝手に同意\n(googleのロゴ)ココ確認しないと\n大変なことに…\n7月30日から\n勝手に同意\n(googleのロゴ)ココ確認しないと\n最悪な事態に…\n7月30日から\n勝手に同意\n(googleのロゴ)ココ確認しないと\n預金奪われます\n伸びてる\n45万\n33万\n伸びてない", "target": "", "script": "", "feedback": "332,353回視聴  2026/06/30\n461,670回視聴  2026/07/01"}, {"doc_heading": "企画6　Gmailで高額請求 メール本文がAiに抜かれてる", "title": "", "thumb_copy": "", "target": "【参考企画】\n90,892回視聴  2026/02/01\n【Gmail】メール本文・添付ファイル全部をAIが抜き取ってる？設定を変更しましょう\n31,055回視聴  2026/03/20\n【Gmail】「知らぬ間」に個人情報がAIに抜かれてる！今すぐココ確認！\n仮説\n全て同じ企画だがこの3本以外は市場にない、投稿順で見ると\n9万再生の訴求をよりコンパクトにして伝わりやすくしたものが50万再生\n⬇︎\nおそらく2枚目の訴求をそのまま表面で擦ったものが3枚目になっているが\n以下の違いにより伸びなかったと考えられる\n1.企画の既視感\n2.フォーマットは同じだが訴求が変わってしまっている\n「オフにして」→「止めて」はニュアンスが一緒だけど前者は設定のことだとイメージできるが、後者は何を止めるべきのかわからない\n「全部抜かれる」→「使われている」前者は悪用されているというイメージがどちらかといえばできるが、後者は悪いイメージに寄せきれていない感じ\n3.色や細かいデザインの違い\n・3枚目はスマホ画像がおまけ程度にしか見えず、文字が画面に詰まりすぎ\n⬇︎\n「AIがメール内の個人情報を悪用しているかも」感があれば3枚目の再生数よりは取れそうだが\nそれでは参考動画の再生数（3~50万再生以下）に落ち着いてしまう可能性が高い\nよってAIに抜かれた先にどんな被害が待っているのかを具体的にしてあげたほうが視聴者は自分ごと化しやすい\n⬇︎\n直近ではチャンネルの規模に比べて多く再生されている動画に頻繁に「高額請求」のワードが使用されていて、そこに危機感を覚えている視聴者が特に多い\ngoogle,LINE,電話など、企画がGmailよりは強そうだけど、悪用された先の結果として視聴者が受ける被害なので「高額請求」というワードを使うことで自分ごと化のしやすさは企画に関わらず増すと考えました！\n⬇︎\n（Gmailロゴ）のここ、まだオンのまま？\nAIがメールを悪用し\n高額請求される…\n今すぐオフに！\n（Gmailロゴ）のここ、まだオンのまま？\nAIに全メール悪用され      \n高額請求される…\n今すぐオフに！\n（Gmailロゴ）のここ、まだオンのまま？\nAIに全メール悪用され      \n高額請求が…\n今すぐオフに！\n・参考サムネの「AIに抜かれる」、「メール内容」を抑えて\n「個人情報」→「高額請求」\n「AIに抜かれる」→「AIに悪用される」\nに変換すれば\n被害内容がイメージしやすく、自分ごと化（設定）がより強くなると考えました！", "script": "こんにちは、由美子です\n実は今、あなたの使っているGmailで\nメールの中身も添付ファイルも\n全部AIに抜き取られ\nそれが悪用されて高額な請求につながる\nそんな恐ろしい可能性があるのを\nご存じでしょうか?\n「私のメールなんて見られて困るものは無いわ」\nそう思った方こそ、かなり危険です\nあなたの受信箱には\nクレジットカードの明細も\n銀行からのお知らせも\nパスワードの再設定メールまで\n大切な情報が全部詰まっていますよね\nその一つひとつを\n今この瞬間もAIが読み取っていて\n知らないうちに外へ持ち出されていたら…\nある日突然\n見覚えのない高額な請求が\n届いてしまうかもしれないんです\n本当に恐ろしくないですか？\nでも、安心してください\n今日お伝えする3つの確認を\n一緒にやっていただくだけで\nこの不安はしっかり消せますから\nその\"ある設定\"を見直して\nあなたのGmailを安全にしていきましょう\nそれではスマホをお手元に用意してくださいね\n【確認①：スマート機能オフ】\nそれではさっそく\n1つ目の確認からいきましょう\n今日いちばんに見ていただきたいのが\n「スマート機能」という設定です\nこれは、あなたのメールの中身を\nAIが読み取り\n返信の文章を考えてくれたり\nおすすめを表示したりする機能なんです\nでも、正直に考えてみてください\nこういう機能を普段から使っている\nという方はほとんどいらっしゃいませんよね\nつまり、ほとんど使わない便利のために\n大切なメールの中身を丸ごとAIに読ませている\nそれが、この設定なんです\n言ってみれば\n（使いもしない部屋のために\n犯罪者に家中の鍵を\n渡してしまっているようなものでして）⬅︎使いもしない部屋＝メール、鍵を渡す＝AIに読み込ませて犯罪者に流出させる？感じ？この具体例が正しいのかわからない\nしかもこの設定は\n最初からオンになったままなんです\n本当に迷惑ですよね\n使わない機能ならオフにしても\nあなたは何も困りません\nむしろ、さっきお話しした\n不安の種を1つ\n減らしておけるんです\nやり方を、一緒に見ていきましょう\nまず、Gmailのアプリを開いて\n画面の左上にある\n三本線のマークを押します\n出てきたメニューを\n一番下までスクロールすると\n「設定」がありますので\nそこを押してください\nさらにここでも一番下までスクロールすると\n「データのプライバシー」という項目がありますよね\nここを選択してください\nその中にある「スマート機能」のトグルが\nオンになっていますよね\nここをタップしてオフにすれば、完了です\nここで一つ、正直にお伝えしますね\nこのスマート機能については\n読み取った中身が\nAIの学習に使われているのでは\nという声も広がっていて\n海外では裁判にもなっているんです\nただ、グーグルはこれを\n「学習には使っていない」と\nはっきり否定していて\n本当のところは、誰にも分かりません⬅︎裁判は決着していないという感じ？作っているGoogleが否定しているなら使ってないってことでは？何か疑念が残っているからって感じ？\nだからこそ、少しでも不安な方は\n自分の手でオフにして\n確かめておくのが安心ですよ\nそれに、オフにしても\nメールを送ったり受け取ったりなどの\n普段の使い方は\n今まで通り何も変わりませんから\nどうぞご安心くださいね\nこれで、あなたのメールを\n勝手に読み取られる入口を\nまず1つ、しっかり閉じることができました\n【確認②：Googleワークスペースのスマート機能オフ】\n続けて2つ目の確認です\n実は先ほどオフにしていただいたスマート機能は\nGmailだけではないんです\n同じ設定画面の中に\nもうひとつ\n「Googleワークスペースのスマート機能」\nという項目があります\nこれはメールの内容を読み取って\nGoogleカレンダーや\nGoogleマップなど\n他のGoogleサービスとも\n情報を共有する機能でして\nたとえば届いたメールに\n「明日の予約は〇時です」と\n書いてあるとカレンダーに自動で追加される\nそういうことができる機能なんです\nもしここも普段から頻繁に使わない\nって方が結構多いのではないでしょうか？\nであれば1つ目と同様\n一緒にオフにしておきましょう⬅︎「Googleワークスペースのスマート機能」だけではなく、下に行くと、「他のサービスのスマート機能」ってのがありますよね、これはどうしたらいいだろうか\nこれでメールの中身が\n他のGoogleサービスへ流れ出る入口も\n1つ閉じることができました\n【確認③：乗っ取りと高額請求】\nさてここまでの2つの設定で\nAIがメールを読み取る入口は\nしっかり閉じることができましたが\n正直に申し上げると\nこれだけではまだ防ぎきれない\n別の危険があるんです\n実は今、Gmailへの不正ログイン被害が\n過去最多のペースで増え続けています\nある調査では\n2025年の不正ログイン件数が\n過去最多を記録していて\n国民生活センターにも\n「身に覚えのないクレジットカードの請求が届いた」\nという相談があとを絶ちません\n「でも私のGmailに入られるはずはない」\nそう思う方もいるかもしれませんね\nでも、考えてみてください\n始めにお伝えしたように\nあなたの受信箱には\nクレジットカードの明細も\nパスワードを再設定するためのメールも\n残っていますよね\nもし誰かがそのメールアドレスと\nパスワードの組み合わせを\nどこかで手に入れたとしたら…\n例えば本物そっくりに作られた\n偽のサイトへ誘導するメールを使って\n自分でパスワードを入力させる\nフィッシング詐欺という手口や\n別のサービスで使い回した\nパスワードを通じて\nGmailへ侵入されてしまうことだってあります\nそして受信箱の情報をもとに\nあなたの名義で\nサービスや買い物の手続きをされて\n見覚えのない高額な請求が\nある日突然届く\nこういう「乗っ取り➡︎高額請求」の流れは\n実際に起きてしまっているんです\n今日ここまでの設定では\nこの入口はまだ開いたままになっていますから\nあと2つ、一緒に塞いでいきましょう\n【確認③-1：2段階認証】\nまず1つ目は「2段階認証」です\nこれはパスワードが仮に\n誰かに知られてしまっても\nあなたのスマホに届く確認コードを入力しないと\nログインできないという仕組みです\n例えると\n玄関の鍵を開けられても\n内側にチェーンがかかっている状態ですから\n鍵だけではもう入ってこられなくなります\n設定の場所を確認しましょう\nGmailのアプリを開いて\n画面の右上にある\n丸いアイコンを押します\n出てきたメニューから\n「Googleアカウントを管理」を\n選んでください\n画面上のタブを横にスライドすると\n「セキュリティとログイン」\nという項目がありますよね\nその中に\n「2段階認証プロセス」とありますので\nそこを押してください\n「使ってみる」や「開始する」\nというボタンが出てきたら\nあとは画面の指示にそって\n進めていただくだけです⬅︎ここの設定の流れも詳しく知りたいですね、ただ私のアカウントは全て2段階認証が済んでいるのでここの正確な順序知れると嬉しい\nこれで万が一パスワードが知られても\nあなたのスマホがない限り\nGmailには入ってこられない状態になりました\n【確認③-2：連携アプリの確認・削除】\nさらにひとつ確認していただきたいのが\nGoogleアカウントに繋がっているアプリの整理です\nなぜかというと\n昔使っていたサービスや\n試しにログインしたアプリやサイトが\n今もGmailと繋がっていることがあり\n身に覚えのないものが残っていたとしたら\nそこから情報が出ていく可能性があるんです\n（この連携を解除することで生じるデメリットも先に言った方がいいかも）\n先ほどの「Googleアカウントを管理」から\n「リンク済みのアプリ」\nという項目がありますよね\nここで連携している必要のないアプリや\nサイトを選択します\nすると全て削除という項目があるので\nそちらを押して\n最後に「確認」をタップすると\n連携を解除することができます\nまた次のような順番でも\n同じ設定に辿り着くことができますから\nもし「うまくいかないよ…」という方がいたら\n画面を一度止めて探してみてくださいね\nGoogleアカウントを管理➡︎セキュリティとログイン➡︎リンク済みのアプリ\nGoogleアカウントを管理➡︎データとプライバシー➡︎サードパーティ製のアプリとサービス\n【設定完了後の行動：メールのリンクを開かない】\n設定はこれですべて完了です\nただ、最後にひとつだけ\n覚えておいていただきたいことがあります\n「お支払いの確認をしてください」\n「ログインがありました」\nそういったメールが届いたとき\nメールの中にあるリンクを押して\nログインしたり支払い手続きをしたりするのは\n絶対にやめてください\n先ほどお話しした\nフィッシング詐欺の入口になっていることがあります\n（こういうメールが届いたら\nリンクは押さずに\nブラウザやアプリを\n自分で直接開いて\n確認するようにしましょうね）⬅︎どのメッセージに対してどのアプリを開いて確認すべきなのかわからない\nさて今日は3つの確認をしてきました\n1つ目はスマート機能をオフにして\nAIにメールを読まれる入口を閉じる\n2つ目はGoogleワークスペースの\nスマート機能も同様にオフにする\n3つ目は2段階認証と連携アプリの確認で\n乗っ取りの入口をしっかり塞ぐ\nこれでGmailまわりの\n大切な安全対策は一通り整いました\n「スマート機能をオフにしたら便利じゃなくなるのかな」\nと心配された方もいるかもしれませんね\nでも実はスマート機能をオフにしても\nGmailにはそのまま使える\n嬉しい機能がしっかり残っています\n(\u000bしかも「こんな使い方があったの」と\n驚かれる方が多いんです\n知らないと損な便利ワザをここからご紹介しますね)⬅︎たくさん紹介しようと思ったけど、1個目の迷惑メールに関しては、別に裏技というか便利技ではない勝手にやってくれていることで、使えるのはこのスターの方一つしかないかなというふうに思いました。\nなので、今までの説明からこういう下のスターの説明をするにあたってのスムーズな展開の仕方を案を出してほしい。具体的に紹介しますねっていう筋立てっていうよりも、おまけ程度にこういう機能もありますから、全部が全部ご迷惑な機能ではありません。\n他にも様々な機能を今後ご紹介していきます。他の動画で紹介していきますねみたいな感じで入れるのがいいかなという風に思います。　ここを一気に圧縮じゃないですけど、最後に締めの3分と家族共有のところがあるんで、そこにギュッてしてもいいかもしれないですね。結構最後の辺で繰り返し同じようなことを言ってるんで、ここ以降の部分は重なってるんで、内容をそこギュッて縮めたい。\n1つ目は\n「スター」を使った\n大切なメールの整理術です\n銀行や病院から届くメールなど\n大切な連絡は\n絶対に見逃したくないですよね\nそんなときに使えるのが\nメールを開いた画面の\n右上にある「☆マーク」です\nこれを押すだけで\nそのメールに星がつきます\nあとでまとめて見返したいときは\n三本線メニューの\n「スター付き」を押せば\nすぐに一覧で確認できます\nフォルダ分けや難しい設定は一切不要です\n大事な連絡が他のメールに埋もれてしまう\nというストレスがなくなりますよ\nそしてひとつだけ\n覚えておいていただきたいことを\n最後にお伝えします\n届いたメールに\nリンクや添付ファイルが\nついていた場合は\nよく知っている方からでも\n不用意に押さないようにしましょう\n差出人のアドレスが\n本物かどうか確認してから\n開くのが安全です\n【締め3文＋家族共有】\n今日は\nGmailのスマート機能をオフにして\nAIに読まれる入口を閉じること\n2段階認証と連携アプリの確認で\n乗っ取りをしっかり防ぐこと\nそして迷惑メールフィルターと\nスター機能で\nGmailを安全に便利に\n使いこなす方法をお伝えしました\n毎日使っているGmailを\n今日一緒に見直せたあなたは\nもう安心です\nこれからは怖がらずに\nメールを開いてくださいね\nこの動画は\nお父さんやお母さん\nご兄弟やご友人にも\nぜひ教えてあげてください\n「自分のGmailは大丈夫かな」と\n気になっている方が\n周りにきっといると思いますから\n【公式LINE CTA】\n最後に\n由美子の公式LINEを\nご紹介します\n今なら登録した方全員に\n『知らないと危険な\nスマホ設定チェックリスト』を\n無料でプレゼントしています\nスマホ一台で\n1分あれば受け取れます\n受け取り方は\nこの動画のタイトル下にある\n説明欄を開いて\n青いリンクを押すだけです\nテレビでご覧の方は\n画面に出ているQRコードを\nスマホのカメラで\n読み取ってみてください\n登録の仕方が\nわからない方のために\n登録方法をご説明した動画も\n一緒にプレゼントに入っています\n一緒に安心して\nスマホを使っていきましょう\nまた次の動画でお会いしましょうね", "feedback": "507,076回視聴  2026/02/14\n【Gmail】個人情報がAIに勝手に吸い取られてる！設定を今すぐ確認してみて\n1行目に目を引くような訴求をどれも持ってきてるのでそれは擦った方がいいかなと思った！\n直近、1ヶ月で伸びてるやつを見るとどれも1行目が強いかも！\nGmailで高額請求\nメール本文が\nAIに全部抜かれてる\n今すぐオフに！！(矢印)\nAIに全部抜かれてる\nは勝手に決済される\nみたいにちょっと大きくした方がいいかも！\nもしかしたら高齢者は見えやすい単語を拾ってサムネを見る癖があるかもなあと思って\n高額請求届きました\nと\n勝手に決済される\nが先に目が入ってみてそう！\n507,076回視聴  2026/02/14\n悪用されるもいいなあと思ったんだけど\n悪用されるという内容は高額請求とニュアンスが同じになってしまうから\n全部抜かれるの方が、高額請求が届くだけじゃなくて\nデータも全部抜かれるの？と避けたい事象が2つ以上になるのでこっちのが強いかも！"}, {"doc_heading": "企画5　LINE乗っとられました", "title": "", "thumb_copy": "384万／2026-01／ゆきえ　https://youtu.be/1BB-g1hrlBY\n→ 【個人情報】『ココ、まだオンのまま？＋犯罪者に＋すぐオフに』のオン前提＋犯罪者＋CTA型をそのまま乗っ取りへ\n訴求案①\nLINEのココがオンだと\n一瞬で乗っ取られる…\n今すぐオフに！\n(b) 乗っ取り×LINE以外で伸び（乗っ取り訴求の勝ち型を借りる）\n225万／2025-08／パソコン博士TAIKI　https://youtu.be/8F9Q2l7DCmI\n→ 【PayPay】ロゴ左上＋『銀行口座が乗っ取られてます』＝テーマ即認識＋乗っ取りの王道\n訴求案②\n（LINEロゴ）が危険\nここがオンだと\n一瞬で乗っ取られる…\n今すぐオフ！\n112万／2026-04／ゆきえ　https://youtu.be/v6-qpIzI2rA\n→ 【前兆】『コレ届いてたら危険／乗っ取りの症状』＝自己診断・前兆型＝視聴者が自分でチェック＝自分ごとMAX\n訴求案③\nこの設定すぐ確認！\nオンになってたら危険\nLINE乗っ取りの症状\n高額請求系が伸びてる\nこんにちは、由美子です\n実は今、何もしていないのに\nLINEを乗っ取られ\n勝手にお金を使われる\nそして後から高額な請求が届く——\nそんな恐ろしい被害が、急増しているのを知っていますか？\n「自分は大丈夫」\nそう思っている方こそ、本当に危険です\nというのも、LINEには最初から\n『ある設定』がオンになっていて\nそこを狙われると\n犯罪者があなたのLINEに\nすっと入り込めてしまいます\n一度入り込まれてしまうと\n犯人はあなたになりすまし\nあなたのスマホで勝手に買い物をして\nその代金を、登録されたカードや\n毎月の携帯電話の料金に\n上乗せして請求させるので\n気づいた時には\n見覚えのない高額な請求だけが残ってしまう事態に\nさらにあなたのアカウントから\nご家族やお友だちに\n「ちょっと1万円貸してほしい」\nなどとお金をだまし取るメッセージが送られ\n周りの方 ロック解除番号、銀行パスワード、クレカ情報、写真、連絡先、カメラ映像\n一番怖いのは気づけないこと（スマホは普通に動く）\nだからFBI・NTTが公式に警告\nパート2：2025年最新手口・チョイスジャッキング\n「許可しない」を押せば大丈夫だったのは過去の話\n2025年、オーストリアの研究で新手口発見\n刺した瞬間、わずか0.3秒で「許可」ボタンが勝手に押される\nホテル備付ケーブル、タクシー備付ケーブルが特に危険\nOMGケーブル（盗聴チップ入り）はAmazonで誰でも買える\nパート3：家の充電器も実は違法だった\n家での充電にも違法の落とし穴\nPSEマーク（電気用品安全法）がない充電器は販売も使用も違法\nAmazonの激安充電器に違法品が多い\n実際に火災事故が年間100件以上発生（経産省データ）\n100均の格安ケーブルも要注意\nパート4：被害を100%防ぐ対策4つ\nコンセントから直接充電する（PSEマーク付き正規品で）\n充電専用ケーブルを持ち歩く（100均で買える）\nUSBデータブロッカーを使う（数百円のアダプター）\nモバイルバッテリーを持ち歩く（PSEマーク付き日本メーカー品）\nエンディング\n今すぐ家の充電器にPSEマークがあるか確認\n外出時はコンセント直結を習慣に\n家族・友人にもこの情報をシェア\n見出しタイトル含め　5133文字　　14分前後\n【知らないと超危険】ここを使用するだけで とんでもない事件に…\n━━━━━━━━━━━━━━━━━━━━\n■ 冒頭フック\n━━━━━━━━━━━━━━━━━━━━\nこんにちは、由美子です\n突然ですが\nカフェやホテルについているあの便利な充電場所\nこのどちらかにスマホを刺すだけで\nクレジットカードの番号や\n銀行の暗証番号\nスマホの中の写真まで\n全部抜き取られてしまう恐ろしい手口が\n今、急増しているのをご存知ですか？\n実はこれ、アメリカのFBIまでもが\n公式に警告を出している深刻な問題なんです\n今日はその被害と対策\nそしてここ1年で新しく見つかった\nほんの一瞬で個人情報が流出する犯罪者の最新手口に加え\nここだけの話、皆さんが今、お家で使っているあの充電器の中に\n法律違反のものがかなり多く出回っているという事実\nこれらをまとめてお伝えします\n知っているか知らないかで\nあなただけでなくご家族やご友人を助けられる内容になるので\nぜひ最後までゆっくり見ていってください\n━━━━━━━━━━━━━━━━━━━━\n■ ジュースジャッキング\n━━━━━━━━━━━━━━━━━━━━\n最初の手口は「ジュースジャッキング」と呼ばれるものです\nこれは公共の場所にあるUSBポートを使って\nスマホの中身を全部盗むという犯罪の手口です\nもしこの手口に引っかかってしまうと\nびっくりするくらいたくさんの個人情報が\n気づかないうちに全部抜き取られてしまうんです\nどうやって盗まれるのかというと\nスマホの中にあるウイルスが入れられてしまうんですね\nこのウイルスは皆さんがスマホで入力する文字を\n1文字残らず記録して犯罪者に送ってしまう\nそんな能力を持っているんです\nあなたがスマホに入力する文字を\n犯罪者が真後ろからずっと覗き見している状態を\nイメージしてみてください\n本当に恐ろしいですよね\n具体的にどんなものが盗まれてしまうかというと\nスマホのロックを解除する暗証番号\n銀行のアプリを開く時のパスワードや暗証番号\nこれら全部が犯罪者に送られてしまいます\nAmazonやYahooショッピングでお買い物をする時に入力する\nIDやパスワード、これも筒抜けです\nそして、何か買い物しようとして\nクレジットカードの番号を入力したら\nカード番号も名前も住所も\n全部盗まれてしまうんですね\nつまり皆さんがスマホで入力したものは\n全部犯罪者に筒抜けになってしまうということなんです\nさらに、スマホに保存している写真や動画も\n全部見られてしまいますし\nスマホのカメラやマイクを\n勝手に操作されてしまうことまであるんです\nスマホを充電しただけで\nこんなことになるって本当に怖いですよね\nしかも一番怖いのは、このウイルスが入ってしまっても\nスマホは何事もなかったかのように\n普通に動いているように見えるということなんです\n例えばある日\nクレジットカードが不正利用されていた\nということが分かったとします\nその時、皆さんは何を疑いますか？\n「変なメールに引っかかったかな？」\n「ネットショッピングのサイトから情報が漏れたのかな？」\n普通はそう考えますよね\nですから「あの時、外で充電したから個人情報が抜かれた」なんて\n原因にたどり着ける人はほとんどいないんです\n知らないうちに個人情報が抜き取られ続けていて\n気づいた時にはもう遅い\nこれが現実なんです\nしかし、今のところ日本国内で\nジュースジャッキングの被害がハッキリと報告されている事例は\nほとんどありません\nだからといって安心はできないんです\n理由はシンプルで、このジュースジャッキングという手口自体は\nすでに海外では大問題になっていて\n先ほどお話ししたように国家機関が\nわざわざ国民に向けて警告を出すレベルで深刻化しています\nそして海外で警告が出ている手口というのは\n時間差で日本に入ってきても何もおかしくないんです\n犯罪者はこの手口を実行するために\nわずか数分でUSBポートの改造を済ませてしまうらしいので\n今この動画を見て対策をしておかないと\n明日、あなたが被害者になっていてもおかしくない\nということなんですね\n━━━━━━━━━━━━━━━━━━━━\n■ チョイスジャッキング\n━━━━━━━━━━━━━━━━━━━━\nでは、刺してしまった場合どうすればいいのか\n実はこれまで、スマホをUSBポートに差すと\n画面に確認のメッセージが出てきていました\nAndroidの場合は\n画面の上の方に通知が出てきて\n「充電のみ」か「ファイル転送」か\nどちらかを選んでくださいという画面\niPhoneの場合は\n「このコンピュータを信頼しますか？」というメッセージが出てきます\nここで「充電のみ」あるいは「信頼しない」を選んでおけば\nデータは盗まれない仕組みになっていたんですね\n実はこの仕組みのおかげで\n約10年間、私たちのスマホは守られていました\nしかしこの安全対策が\n2025年についに破られてしまったんです\nオーストリアのとある大学の研究チームが\n新しい手口を発見しました\nその名も「チョイスジャッキング」\n「選択を乗っ取る」という意味の名前です\n何が新しいかというと、ケーブルを差した瞬間\nわずか0.13秒で\n「ファイル転送を許可する」「信頼する」のボタンが\n勝手に押されてしまうんです\n0.13秒というのは、人間のまばたきよりも速い時間ですから\n画面を見て、判断する時間すらありません\nこれが現実なんですね\n特に深刻なのが一部のAndroid機種で\n画面にロックがかかっていても\nそのまま個人データを抜かれてしまうことが確認されています\nでもここで、ちょっと希望のあるお話もあります\nこのことを受けて、アップルとグーグルは2025年に\n対策のアップデートを出してくれました\niPhoneの場合は「iOS 18.4」というアップデート以降\nAndroidの場合は「Android 15」というアップデート以降\nそれぞれUSBで何かを繋いだ時に\n指紋認証や暗証番号の入力が必要になるという\n安全機能が追加されました\n逆に言うと、古いスマホを使い続けている方や\nアップデートを止めている方は\n今もこの危険な状態のままということになります\nスマホの「設定」から「ソフトウェア更新」を開いて\n最新の状態になっているか\n動画を見終わったら必ず確認してみてくださいね\n━━━━━━━━━━━━━━━━━━━━\n■外で安全に充電する対策4つ\n━━━━━━━━━━━━━━━━━━━━\nここまで聞いて\n「じゃあもう、どうやって充電すればいいの？」\nと不安になった方も多いと思います\nでも安心してください\nここからお伝えする対策を4つ\nこれさえやっておけば\n外で充電する時の被害をきっちり防げます\nしかもとても簡単に済む方法ばかりですので\nぜひメモを取りながら聞いてくださいね\n──── 対策その1・モバイルバッテリーを持ち歩く ────\nまず一番完璧な対策は\n「自分専用のモバイルバッテリーを持ち歩くこと」です\nなぜこれが一番完璧かというと\nそもそも公共の充電ポートを使わなければ\n今日お話しした被害は\n全部100%防げるからなんですね\n選び方のポイントは3つあります\n1つ目、信頼できる日本メーカーの正規品を選ぶこと\n2つ目、容量は10,000mAh以上のものを選ぶこと\nこれでスマホを2回から3回フル充電できます\n3つ目、できるだけ軽くて薄いものを選ぶこと\n持ち歩くのが負担にならないものがいいですね\n──── 対策その2・コンセントから直接充電する ────\n2つ目は、モバイルバッテリーを忘れてしまった時の対策\n「コンセントから直接充電する」方法です\n家で使っている四角い充電アダプターありますよね\nあれをカバンに入れて持ち歩いてください\nコンセントから流れてくるのは電気だけなので\nデータが盗まれる心配は一切ないんです\nUSBの差し込み口の方は、先ほどお話ししたとおり\n犯罪者に改造されている可能性があるので\n絶対に使わないようにしてください\n──── 対策その3・充電専用ケーブルを持ち歩く ────\n3つ目は、どうしてもUSBポートしか使えない時のための対策です\nそんな時にまず知っておいてほしいのが\nこんなケーブルです\nホテルの部屋に備え付けられているケーブル\nタクシーの後部座席に置いてあるケーブル\nこれは絶対に使わないでください\n何が仕込まれているかわからないので\n危険性が一気に跳ね上がります\n中でも特に恐ろしいのが「OMGケーブル」と呼ばれるものです\n見た目はただのUSBケーブルなんですが\n中に小さなチップが仕込まれていて\nあなたがスマホで入力した文字\nパスワード\nクレジットカード番号\nそれを全部記録して\n犯罪者に送ってしまうんです\nしかもこのOMGケーブル\n実はネットで個人でも買えてしまうんですよね\nつまり、人から借りたケーブル\nホテルやタクシーに置いてあるケーブル\nそれが安全な充電ケーブルなのか\nOMGケーブルなのか\n見た目では区別がつかないんです\nだからこそ、外で充電する時は\n自分専用の「充電専用ケーブル」を\n1本カバンに入れて持ち歩いてください\nこれは100円ショップでも普通に売っていて\nパッケージに「充電専用」または「データ通信非対応」と\n書かれているものを選べばOKです\n「普通のケーブルと何が違うの？」と思いますよね\n普通のケーブルは、電気を流す線と\nデータを流す線が両方入っているんです\nでも充電専用ケーブルは\nデータを流す線が物理的に入っていない\n線がないものはデータの抜きようがありませんよね\nだから何が刺さっていようが\nデータは絶対に盗まれないというわけです\n──── 対策その4・USBデータブロッカーを使う ────\n最後、4つ目は\nお気に入りのケーブルがあって\nそのまま使いたいという方向けの対策です\n「USBデータブロッカー」という小さな部品があります\n指先くらいの小さなアダプターで\nこれをUSBポートとケーブルの間に挟むだけ\nデータの通信を物理的に遮断してくれるんです\nこれも数百円で買えます\n特に旅行や出張が多い方\n防災リュックの中にも1個入れておくと安心ですよ\n━━━━━━━━━━━━━━━━━━━━\n■ 家の充電器も実は違法だった\n━━━━━━━━━━━━━━━━━━━━\nさて、ここまでで外で安全に充電する方法はバッチリですね\nただ、ここまで聞いて\n「外がそんなに怖いなら、もう家でしか充電しない」\nそう思った方もいらっしゃると思います\nその判断、半分は正解です\nでも実は、家での充電にも\n別の落とし穴があるんです\nしかもこちらは法律違反まで絡んでくる\nかなり深刻な話なんですね\nつまり外で対策をしている方も\n家でしか充電しないと決めた方も\n両方とも、ここからの話は必ず知っておいてください\nちなみに、さっきの対策1で紹介したモバイルバッテリー\nそれから対策2で紹介したコンセント直結用の充電器\nこれらにもあてはまる話ですので\n合わせて覚えておいてくださいね\n皆さんの充電器には\n「PSE」という丸い印、書かれていますか？\n実はこのPSEマークというのは\n電気用品安全法という日本の法律で\n日本国内で売っていいと認められた電気製品にだけ\n付けられるマークなんです\nつまり、PSEマークがない充電器を売ること\nこれは法律違反、完全に違法なんですね\n【テロップ表示】\n※罰則：法人は1億円以下の罰金\n個人は1年以下の懲役または100万円以下の罰金\nこれくらい、かなり厳しい罰則が定められているんです\n特に注意してほしいのが、ネット通販で売っている\n500円とか1,000円くらいの激安充電器\n純正品より何分の1かの値段で買えるから\nお得だと思って買ってしまう方が多いんですが\nこの中にはPSEマークがない違法品が\n紛れ込んでいることがよくあるんです\nなぜここまで厳しく義務化されているのかというと\n寝ている間に枕の下で充電器が発火した\nバッテリーが膨らんでスマホが破裂した\nコンセントから火花が出て家が全焼してしまった\nこのような火災事故が実際に起きているからです\n公式なデータ（経済産業省）によると\nモバイルバッテリーやスマホの充電器などによる事故は\n2020年から2024年までの5年間で\n1,860件報告されています\nそのうちの約85パーセント\n1,587件が火災事故に発展しているんです\nとても危険ですよね\nですので、お家の充電器はもちろん\nさっき紹介したモバイルバッテリーや\n持ち歩く用の充電アダプターも\nすべてPSEマーク付きの正規品かどうか\n動画を見終わったら必ず確認してみてください\nもしなければ、火災の原因になる可能性があるので\n今日中に買い替えていただくことを強くおすすめします\n━━━━━━━━━━━━━━━━━━━━\n■ エンディング\n━━━━━━━━━━━━━━━━━━━━\nそして、今日の内容\nぜひご家族やお友達にもシェアしてあげてください\n知っているだけで防げる被害です\n特に、普段スマホをよく使う方ほど\n被害に遭いやすいので\n周りの方にも教えてあげてくださいね\nこれからもスマホを安心して使えるような情報をお届けしていきますので\nいいねとチャンネル登録もお願いしますね\nそれでは、また次の動画でお会いしましょう\n━━━━━━━━━━━━━━━━━━━━\n■ 冒頭フック\n━━━━━━━━━━━━━━━━━━━━\nこんにちは、由美子です\n突然ですが\nコンビニやカフェ、ホテルについてるこのコンセントに見覚えありますか？\n実はこのどちらかにスマホを刺すだけで\nクレジットカードの番号や\n銀行の暗証番号\nスマホの中の写真まで\n全部抜き取られてしまう恐ろしい手口が今急増しているんです\nあのアメリカのFBIまでも\n公式に警告を出すぐらいとても深刻な問題…\n今日はその詳しい被害内容と対策\nそしてここ1年で新しく見つかった\nほんの一瞬で個人情報が流出する犯罪者の最新手口について\n徹底的に解説していきます\n動画の最後には\nほとんどの人が持っているスマホの充電器が\nもしかしたら違法になっている可能性もあるので\nぜひ最後までみて今のうちに対策しておきましょう\n━━━━━━━━━━━━━━━━━━━━\n■ ジュースジャッキング\n━━━━━━━━━━━━━━━━━━━━\n最初の手口は「ジュースジャッキング」と呼ばれるものです\nこれは公共の場所にあるUSBポートを使って\nスマホの中身を全部盗むという犯罪の手口です\nもしこの手口に引っかかってしまうと\nびっくりするくらいたくさんの個人情報が\n気づかないうちに全部抜き取られてしまうんです\nどうやって盗まれるのかというと\nスマホの中にあるウイルスが入れられてしまうんですね\nこのウイルスは皆さんがスマホで入力する文字を\n1文字残らず記録して犯罪者に送ってしまう\nそんな能力を持っているんです\nあなたがスマホに入力する文字を\n犯罪者が真後ろからずっと覗き見している状態を\nイメージしてみてください\n本当に恐ろしいですよね\n具体的にどんなものが盗まれてしまうかというと\nスマホのロックを解除する暗証番号\n銀行のアプリを開く時のパスワードや暗証番号\nこれら全部が犯罪者に送られてしまいます\nAmazonやYahooショッピングでお買い物をする時に入力する\nIDやパスワード、これも筒抜けです\nそして、何か買い物しようとして\nクレジットカードの番号を入力したら\nカード番号も名前も住所も\n全部盗まれてしまうんですね\nつまり皆さんがスマホで入力したものは\n全部犯罪者に筒抜けになってしまうということなんです\nさらに、スマホに保存している写真や動画も\n全部見られてしまいますし\nスマホのカメラやマイクを\n勝手に操作されてしまうことまであるんです\nスマホを充電しただけで\nこんなことになるって本当に怖いですよね\nしかも一番怖いのは、このウイルスが入ってしまっても\nスマホは何事もなかったかのように\n普通に動いているように見えるということなんです\n例えばある日\nクレジットカードが不正利用されていた\nということが分かったとします\nその時、皆さんは何を疑いますか？\n「変なメールに引っかかったかな？」\n「ネットショッピングのサイトから情報が漏れたのかな？」\n普通はそう考えますよね\nですから「あの時、外で充電したから個人情報が抜かれた」なんて\n原因にたどり着ける人はほとんどいないんです\n知らないうちに個人情報が抜き取られ続けていて\n気づいた時にはもう遅い\nこれが現実なんです\nしかし、今のところ日本国内で\nジュースジャッキングの被害がハッキリと報告されている事例は\nほとんどありません\nだからといって安心はできないんです\n理由はシンプルで、このジュースジャッキングという手口自体は\nすでに海外では大問題になっていて\n先ほどお話ししたように国家機関が\nわざわざ国民に向けて警告を出すレベルで深刻化しています\nそして海外で警告が出 です\u000b 自撮りを美肌にしたり、顔の形を整えたりできる写真加工アプリです\n写真加工アプリは、顔写真・アルバム・カメラへのアクセスを求めることが多いです\u000b つまり、自分の顔やスマホ内の写真データに近い場所にあるアプリということです\n中国製だから危険というよりも、顔写真を扱うアプリは運営元やプライバシーポリシーを確認してから使うことが大切です\n⑤ SODA・Ulike・BeautyCam系の写真加工アプリ\n5つ目は、SODA・Ulike・BeautyCamなどの写真加工アプリです\u000b このジャンルは若い人を中心に人気ですが、カメラ・写真・顔データを扱うため注意が必要です\n加工アプリは、便利な反面、顔写真や撮影データをどのように扱っているのかが分かりにくい場合があります\n特に、アプリを使うたびに写真フォルダ全体へのアクセスを許可している人は、一度設定を見直してみてください\n⑥ Simeji\n6つ目はSimejiです\u000b Simejiは日本語入力のキーボードアプリとして有名です\nキーボードアプリが怖い理由は、ID・パスワード・住所・電話番号・クレジットカード情報など、入力する文字すべてに関わる場所にあるからです\n過去には入力情報の送信に関する問題が報道されたこともあります\u000b 現在は改善されているとされていますが、心配な人はiPhone純正キーボードやAndroidのGboardなど、標準系のキーボードを使う方が安心です\n⑦ WPS Office\n7つ目はWPS Officeです\u000b WordやExcelのような文書作成・表計算が無料で使える便利なアプリです\nただ、仕事の資料・契約書・個人情報が入ったファイルを扱う可能性があるため、運営元や保存先には注意が必要です\n無料で使える便利さはありますが、機密性の高い書類を扱う場合は、Microsoft OfficeやGoogleドキュメントなど、信頼性の高いサービスと使い分けた方が安心です\n⑧ Temu\n8つ目はTemuです\u000b とにかく安く買えるショッピングアプリとして有名です\nただ、ショッピングアプリでは、氏名・住所・電話番号・メールアドレス・クレジットカード情報などを入力します\n安さは魅力ですが、海外系のショッピングアプリを使う場合は、個人情報が流出する可能性もゼロではない前提で使うことが大切です\n使うなら、クレジットカードを1枚に限定する、コンビニ払いを使う、明細を定期的に確認するなどの対策をしましょう\n⑨ SHEIN\n9つ目はSHEINです\u000b こちらも低価格で服や雑貨が買える人気のショッピングアプリです\nTemuと同じく、安さが魅力ですが、購入には個人情報の入力が必要になります\u000b また、クレジットカード情報や配送先住所を登録するため、情報管理には注意が必要です\n利用する場合は、普段使いのメインカードではなく、利用額を管理しやすいカードを使うなどの対策がおすすめです\n⑩ 小紅書／RED\n10個目は小紅書、REDです\u000b 中国版InstagramとAmazonを合わせたようなSNS・口コミアプリです\n美容・ファッション・旅行などの情報収集に便利ですが、SNSとショッピング要素があるため、閲覧履歴・検索履歴・興味関心・投稿内容などの情報が蓄積されます\n台湾では安全上の理由から利用が制限されたという話もあり、使う場合は「どんな情報を渡しているのか」を意識することが大切です\n⑪ UC Browser\n11個目はUC Browserです\u000b ブラウザアプリは、検索履歴・閲覧履歴・ログイン情報など、かなりプライバシー性の高い情報を扱います\n過去には、検索履歴や位置情報を外部に送信していたと指摘されたこともあります\nブラウザは毎日使う中心的なアプリなので、Chrome・Safari・Microsoft Edgeなど、信頼性の高いものを使う方が安心です\n⑫ クリーナーアプリ全般\n12個目はクリーナーアプリです\u000b 「スマホが重い」「ウイルスが見つかりました」「今すぐ削除してください」と不安を煽ってくるタイプのアプリには注意が必要です\n特にAndroidでは、ファイルやメディアへのアクセスを求めてくるクリーナーアプリもあります\nしかし、多くの場合、スマホに標準で入っている機能やFiles by Googleで十分です\u000b わざわざ提供元が不明なクリーナーアプリを入れる必要はありません\n⑬ QRコード読み取りアプリ・健康管理アプリ\n13個目はQRコード読み取りアプリや、提供元が不明な健康管理アプリです\n最近のスマホは、標準カメラでQRコードを読み取れます\u000b それなのに、わざわざ別アプリを入れて、カメラ・位置情報・連絡先などの権限を与える必要はあまりありません\nまた、健康管理アプリは、体重・歩数・睡眠・身体活動など、かなり個人的な情報を扱います\u000b 提供元が不明な場合は、安易に使わない方が安心です\n---\n—\nアプリでシニアでも共感できそうなものかつ中国系5つを残して\n競合のやっていた中国系以外のあぷないアプリを4つ追加してhttps://www.youtube.com/watch?v=VGDJTkJolus&t=448s\n以下の構成にしてます！1. Simeji(キーボードアプリ)\n2. TikTok(動画アプリ)\n3. Temu / SHEIN(お買い物アプリ)\n4. 小紅書 / RED(中国版インスタ)\n5. 怪しいセキュリティアプリ\n6. 怪しいクリーナーアプリ\n7. 怪しいQRコード読み取りアプリ\n8. 電話帳ナビ系アプリ\n10分21秒→3800文字\nこんにちは、ゆみこです\n突然ですが今あなたのスマホの中に\n入っているだけで、クレジットカードを不正利用される\nそんな危険なアプリが紛れ込んでいるかもしれないこと\nご存知ですか?\nしかも厄介なのは\nこうしたアプリって見た目は\n「便利そう」「お得そう」な顔をしてるんですよね\n「いやいや、自分は変なアプリは入れてないから大丈夫」\nそう思った方こそ、ぜひ最後まで見ていただきたいんです\nなぜかというと\n今からお話しする8個のアプリ\nご自身でも気づかずに入れてしまっているケースが\n本当に多いんですよ\nでも安心してください\n今日この動画を見て「入っていれば削除する」\nそれだけで被害は防げます\nぜひ最後まで一緒に確認していきましょうね\n① Temu(テム) / SHEIN(シーイン)\nまず1つ目は、お買い物アプリの\n「Temu(テム)」と「SHEIN(シーイン)」です\n最近、テレビCMでもよく流れていますし\nスマホでネットを見ていると\nやたら広告が出てきません?\n「とにかく安い」ということで\nダウンロードしてみた方も多いかもしれません\nここでちょっと考えてみてほしいんです\nなんでそんなに安くできるんでしょうか?\n「安いには安いなりの理由がある」\n昔からよく言いますよね\nTemuの場合、その「裏」というのは\nお金以外に、あなたの「個人情報」も商品代の一部として支払っている\nと考えると分かりやすいんです\n実際、アメリカでは\nTemuに対してある州の検察のトップが裁判を起こしました\nその中でTemuのことを\n「スマホ全体の情報をこっそり盗み見る、ウイルスのようなアプリ」だと\n正式に告発しているんです\n具体的に、Temuは\n・カメラやマイクであなたの顔や声、周りの音まで聞ける状態\n・今どこにいるかの位置情報\n・ご家族・お友達の電話番号や連絡先\n・LINEやメールでやり取りしているメッセージの中身まで\nお買い物には全く関係ない情報まで\nこっそり覗ける作りになっている、と告発されています\nそして1番怖いのが\nTemuに登録したクレジットカード番号も\nこの覗き見の対象になっているということ\n実際、海外では\n「Temuで買い物しただけなのに\n後日、身に覚えのない請求が来た」という\n被害が多数報告されているんですよ\nその州の検察は住民に向けて\n「今すぐアカウントを削除して、アプリも消した上で\nスマホがウイルスに感染していないか調べてください」と\n公式に呼びかけたほどです\nちなみにTemuもSHEINも、運営しているのは中国の会社です\n中国の会社って、政府から「データを出しなさい」と言われたら\n断れない決まりがあるんですよね\nつまり、あなたのカード情報や住所が\n中国政府にいつ渡ってもおかしくない、という状態\n「安いから」というだけで入れてしまうと\nお買い物以上のものを失っているかもしれません\nお買い物は、楽天やAmazonなど\n日本でも長く使われているアプリを使うようにしましょう\n2つ目は「TikTok(ティックトック)」です\n短い動画が次々と流れてくるアプリで\n世界中で爆発的に流行しているSNSですよね\n自分は使わないという方も\nご家族の中で使っている方を見かけたことがある\nという方は多いんじゃないでしょうか\nこのTikTok、利用者の知らないうちに\nこんな情報を集めていることが分かっているんです\n・あなたが今どこにいるかの「位置情報」を1時間に1回取得\n・スマホに登録されているご家族やお友達の連絡先\n・カレンダーに入れている const KK_KEY = 'yt_kikaku_v1';
const SEEDED_KEY = 'yt_kikaku_seeded';

function kkEsc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function kkAttr(s){ return kkEsc(s).replace(/"/g,'&quot;'); }
function kkLoad(){ try{ return JSON.parse(localStorage.getItem(KK_KEY)||'[]'); }catch(e){ return []; } }
function kkSave(arr){ localStorage.setItem(KK_KEY, JSON.stringify(arr)); }
function kkUid(){ return 'k'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function togglePdca(){
  const b=document.getElementById('pdca-body'), t=document.getElementById('pdca-toggle');
  if(!b) return;
  const c=b.classList.toggle('collapsed');
  if(t) t.textContent = c ? '▼ 開く' : '▲ 閉じる';
}

function blankKikaku(){
  return { id:kkUid(), status:'plan', title:'', thumb_copy:'', target:'',
    refs:[], script:'', feedback:'', my_url:'', my_id:'', published:'',
    review:{ views:'', impressions:'', ctr:'', retention:'', hypothesis:'',
             result:'', lesson_thumb:'', lesson_title:'', lesson_script:'', next:'' } };
}

function newKikaku(){
  const arr=kkLoad(); const k=blankKikaku(); arr.unshift(k); kkSave(arr); renderKikaku();
  const el=document.getElementById('kk-'+k.id); if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

function newKikakuFromOpp(idx){
  const o = OPPS && OPPS[idx]; if(!o) return;
  const arr=kkLoad(); const k=blankKikaku();
  k.target = o.label + '（平均' + Math.round((o.avg_views||0)/10000) + '万再生 / 投稿空白' + (o.gap_days||0) + '日 / 競合' + (o.total_videos||0) + '本）';
  k.refs = (o.refs||[]).map(r=>({ title:r.title||'', url: r.id ? ('https://www.youtube.com/watch?v='+r.id) : '' }));
  arr.unshift(k); kkSave(arr); renderKikaku();
  // PDCAを開いてスクロール
  const body=document.getElementById('pdca-body'); if(body){ body.classList.remove('collapsed'); const t=document.getElementById('pdca-toggle'); if(t)t.textContent='▲ 閉じる'; }
  const el=document.getElementById('kk-'+k.id); if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

function kkFind(id){ return kkLoad().find(k=>k.id===id); }

function upd(id, path, val){
  const arr=kkLoad(); const k=arr.find(x=>x.id===id); if(!k) return;
  const parts=path.split('.'); let o=k;
  for(let i=0;i<parts.length-1;i++){ if(o[parts[i]]==null)o[parts[i]]={}; o=o[parts[i]]; }
  o[parts[parts.length-1]]=val; kkSave(arr);
}

function setStatus(id){
  const arr=kkLoad(); const k=arr.find(x=>x.id===id); if(!k) return;
  k.status = k.status==='posted' ? 'plan' : 'posted'; kkSave(arr); renderKikaku();
}

function deleteKikaku(id){
  if(!confirm('この企画を削除しますか？')) return;
  kkSave(kkLoad().filter(k=>k.id!==id)); renderKikaku();
}

function addRef(id){
  const arr=kkLoad(); const k=arr.find(x=>x.id===id); if(!k) return;
  k.refs=k.refs||[]; k.refs.push({title:'',url:''}); kkSave(arr); renderKikaku();
}
function delRef(id,i){
  const arr=kkLoad(); const k=arr.find(x=>x.id===id); if(!k) return;
  k.refs.splice(i,1); kkSave(arr); renderKikaku();
}
function updRef(id,i,field,val){
  const arr=kkLoad(); const k=arr.find(x=>x.id===id); if(!k||!k.refs[i]) return;
  k.refs[i][field]=val; kkSave(arr);
}

// マイチャンネル動画クリック → 紐づく企画を作成 or 既存へ
function linkMyVideo(vid){
  const v=(MYCH.videos||[]).find(x=>x.id===vid); if(!v) return;
  let arr=kkLoad(); let k=arr.find(x=>x.my_id===vid);
  if(!k){
    k=blankKikaku(); k.status='posted'; k.title=v.title; k.my_id=vid;
    k.my_url='https://www.youtube.com/watch?v='+vid; k.published=v.published_at;
    k.review.views=String(v.view_count||'');
    arr.unshift(k); kkSave(arr);
  }
  renderKikaku();
  const body=document.getElementById('pdca-body'); if(body){ body.classList.remove('collapsed'); const t=document.getElementById('pdca-toggle'); if(t)t.textContent='▲ 閉じる'; }
  const el=document.getElementById('kk-'+k.id); if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

function renderMyChannel(){
  const wrap=document.getElementById('pdca-mych'); if(!wrap) return;
  const vids=(MYCH&&MYCH.videos)||[];
  if(!vids.length){ wrap.innerHTML='<div class="kk-empty">まだ動画がありません</div>'; return; }
  const have=new Set(kkLoad().map(k=>k.my_id).filter(Boolean));
  wrap.innerHTML=vids.map(v=>{
    const badge = have.has(v.id)
      ? '<span class="pmv-badge has">✓ 振り返りあり</span>'
      : '<span class="pmv-badge no">＋ 振り返りを作成</span>';
    return '<div class="pmv" onclick="linkMyVideo(\''+v.id+'\')">'+
      '<img src="'+kkAttr(v.thumbnail)+'" loading="lazy" onerror="this.style.visibility=\'hidden\'">'+
      '<div class="pmv-b"><div class="pmv-t">'+kkEsc(v.title)+'</div>'+
      '<div class="pmv-m">▶ '+(v.view_count||0).toLocaleString()+'回 ｜ '+kkEsc(v.published_at)+'</div>'+
      badge+'</div></div>';
  }).join('');
}

function refRow(id,i,r){
  return '<div class="kk-ref">'+
    '<input placeholder="参考動画タイトル" value="'+kkAttr(r.title)+'" onchange="updRef(\''+id+'\','+i+',\'title\',this.value)">'+
    '<input placeholder="URL" value="'+kkAttr(r.url)+'" onchange="updRef(\''+id+'\','+i+',\'url\',this.value)">'+
    '<button class="kk-ref-del" onclick="delRef(\''+id+'\','+i+')" title="削除">✕</button></div>';
}

function ta(id,path,val,ph,cls){
  return '<textarea class="'+(cls||'')+'" placeholder="'+kkAttr(ph)+'" onchange="upd(\''+id+'\',\''+path+'\',this.value)">'+kkEsc(val)+'</textarea>';
}
function inp(id,path,val,ph){
  return '<input placeholder="'+kkAttr(ph)+'" value="'+kkAttr(val)+'" onchange="upd(\''+id+'\',\''+path+'\',this.value)">';
}

function anFor(k){
  if(!MYAN || !MYAN.videos) return null;
  const id = k.my_id || (k.my_url ? (k.my_url.split('v=')[1]||'').split('&')[0] : '');
  return id ? MYAN.videos[id] : null;
}

function kkApplyAnalytics(id){
  const k=kkFind(id); const a=k?anFor(k):null; if(!a) return;
  upd(id,'review.views',String(a.views));
  upd(id,'review.retention',String(a.retention));
  renderKikaku();
}

function mfield(label, inputHtml){
  return '<div class="kk-mf"><label>'+label+'</label>'+inputHtml+'</div>';
}

  if(a){
    const up=(MYAN&&MYAN.updated_at)||'';
    h+='<span class="kk-an-auto">自動取得・'+kkEsc(up)+'</span>';
    h+='</div><div class="kk-an-grid">'+
      '<span><b>'+(a.views||0).toLocaleString()+'</b><small>再生数</small></span>'+
      '<span><b>'+a.retention+'%</b><small>視聴維持率</small></span>'+
      '<span><b>'+a.avg_duration_sec+'秒</b><small>平均視聴</small></span>'+
      '<span><b>'+(a.watch_minutes||0).toLocaleString()+'分</b><small>総視聴時間</small></span>'+
      '<span><b>👍'+(a.likes||0)+'</b><small>高評価</small></span>'+
      '<span><b>💬'+(a.comments||0)+'</b><small>コメント</small></span>'+
      '<span><b>+'+(a.subs_gained||0)+'</b><small>登録者増</small></span>'+
    '</div>';
  } else {
    h+='</div>';
  }
  // 手入力ブロック（CTR・インプレはAPI非公開のためStudioから）
  h+='<div class="kk-an-manual"><div class="kk-an-mlabel">🖊 YouTube Studioから手入力（API非公開）</div><div class="kk-an-mgrid">';
  h+=mfield('インプレッション', inp(k.id,'review.impressions',rv.impressions,'80000'));
  h+=mfield('クリック率 CTR(%)', inp(k.id,'review.ctr',rv.ctr,'4.5'));
  if(!a){
    h+=mfield('再生数', inp(k.id,'review.views',rv.views,'12000'));
    h+=mfield('視聴維持率(%)', inp(k.id,'review.retention',rv.retention,'35'));
  }
  h+='</div></div></div>';
  return h;
}

function kkCard(k){
  const rv=k.review||{};
  const refsHtml=(k.refs||[]).map((r,i)=>refRow(k.id,i,r)).join('') ||
    '<div style="font-size:11px;color:#4a6178">参考動画なし</div>';
  const posted = k.status==='posted';
  return '<div class="kk'+(posted?' posted':'')+'" id="kk-'+k.id+'">'+
    '<div class="kk-head">'+
      '<span class="kk-status '+(posted?'posted':'plan')+'" onclick="setStatus(\''+k.id+'\')">'+
        (posted?'✅ 投稿済み':'📝 企画中')+'</span>'+
      '<input class="kk-title-in" placeholder="動画タイトル（案）" value="'+kkAttr(k.title)+'" onchange="upd(\''+k.id+'\',\'title\',this.value)">'+
      '<button class="kk-del" onclick="deleteKikaku(\''+k.id+'\')">🗑 削除</button>'+
    '</div>'+
    '<div class="kk-body">'+
      // 左カラム: 企画
      '<div class="kk-col">'+
        '<div class="kk-sec">🎯 企画（Plan）</div>'+
        '<div class="kk-field"><label>狙ったチャンス・根拠</label>'+ta(k.id,'target',k.target,'例: LINE×乗っ取り（平均137万再生 / 投稿空白125日）','')+'</div>'+
        '<div class="kk-field"><label>サムネ文言案</label>'+ta(k.id,'thumb_copy',k.thumb_copy,'例: 知らないと乗っ取られる','')+'</div>'+
        '<div class="kk-field"><label>参考にした動画</label><div class="kk-refs">'+refsHtml+
          '<button class="kk-ref-add" onclick="addRef(\''+k.id+'\')">＋ 参考動画を追加</button></div></div>'+
        '<div class="kk-field"><label>台本</label>'+ta(k.id,'script',k.script,'台本をここに貼り付け…','sc')+'</div>'+
        '<div class="kk-field kk-fb"><label>📝 添削・フィードバック（赤文字＝改善版）</label>'+ta(k.id,'feedback',k.feedback,'ドキュメントの赤文字（添削）がここに入ります','sc')+'</div>'+
        '<div class="kk-field"><label>自分の動画URL</label>'+inp(k.id,'my_url',k.my_url,'https://youtube.com/watch?v=...')+'</div>'+
        '<div class="kk-field"><label>投稿日</label>'+inp(k.id,'published',k.published,'2026-06-10')+'</div>'+
      '</div>'+
      // 右カラム: 振り返り
      '<div class="kk-col">'+
        anPanel(k)+
        '<div class="kk-sec review">📝 投稿1週間後の振り返り（Check / Act）</div>'+
        '<div class="kk-field"><label>仮説（なぜ伸びる/伸びたと思ったか）</label>'+ta(k.id,'review.hypothesis',rv.hypothesis,'需要が高く競合が止まっていたから…','')+'</div>'+
        '<div class="kk-field"><label>実際どうだったか</label>'+ta(k.id,'review.result',rv.result,'想定より伸びた/伸びなかった理由…','')+'</div>'+
        '<div class="kk-field"><label>🖼 サムネの改善点</label>'+ta(k.id,'review.lesson_thumb',rv.lesson_thumb,'','')+'</div>'+
        '<div class="kk-field"><label>📝 タイトルの改善点</label>'+ta(k.id,'review.lesson_title',rv.lesson_title,'','')+'</div>'+
        '<div class="kk-field"><label>🎬 台本の改善点</label>'+ta(k.id,'review.lesson_script',rv.lesson_script,'','')+'</div>'+
        '<div class="kk-field"><label>➡️ 次にやること</label>'+ta(k.id,'review.next',rv.next,'','')+'</div>'+
      '</div>'+
    '</div>'+
  '</div>';
}

// タイトル類似でマイチャンネル動画を探す（bigram Jaccard）
function _bg(s){ s=(s||'').replace(/[\s　【】\[\]！!？?…・]/g,''); const o=new Set(); for(let i=0;i<s.length-1;i++)o.add(s.slice(i,i+2)); return o; }
function matchMyVideo(title){
  const vids=(MYCH&&MYCH.videos)||[]; const a=_bg(title); if(!a.size) return null;
  let best=null, bestS=0;
  vids.forEach(v=>{ const b=_bg(v.title); let inter=0; a.forEach(x=>{ if(b.has(x))inter++; });
    const uni=a.size+b.size-inter; const s=uni?inter/uni:0; if(s>bestS){bestS=s;best=v;} });
  return bestS>=0.30 ? best : null;
}

// 企画ドキュメントのシードを取り込む。
// ドキュメント由来の項目(タイトル/サムネ/根拠/台本/添削)は常に同期、
// 振り返り(CTR・仮説等)やrefsは保持。削除した企画は復活させない。
function seedKikaku(){
  if(!SEED || !SEED.length) return;
  const arr=kkLoad();
  let seeded; try{ seeded=new Set(JSON.parse(localStorage.getItem(SEEDED_KEY)||'[]')); }catch(e){ seeded=new Set(); }
  let changed=false;
  SEED.forEach(s=>{
    const key='doc:'+(s.doc_heading||s.title||'');
    const ex=arr.find(k=>k.doc_key===key);
    if(ex){
      // ドキュメント由来フィールドを同期（振り返りは保持）
      if(s.title) ex.title=s.title;
      ex.thumb_copy=s.thumb_copy||'';
      ex.target=s.target||'';
      ex.script=s.script||'';
      ex.feedback=s.feedback||'';
      changed=true;
    } else if(!seeded.has(key)){           // 未取り込みなら新規作成（削除済みは復活させない）
      const k=blankKikaku();
      k.doc_key=key;
      k.title=s.title || s.doc_heading || '';
      k.thumb_copy=s.thumb_copy||'';
      k.target=s.target||'';
      k.script=s.script||'';
      k.feedback=s.feedback||'';
      const mv=matchMyVideo(s.title);
      if(mv){ k.status='posted'; k.my_id=mv.id; k.my_url='https://www.youtube.com/watch?v='+mv.id; k.published=mv.published_at; }
      arr.push(k); changed=true;
    }
    seeded.add(key);
  });
  if(changed) kkSave(arr);
  localStorage.setItem(SEEDED_KEY, JSON.stringify([...seeded]));
}

function renderKikaku(){
  const list=document.getElementById('pdca-list'); if(!list) return;
  const arr=kkLoad();
  const cnt=document.getElementById('pdca-count');
  if(cnt) cnt.textContent = arr.length ? (arr.length+'件の企画') : '';
  if(!arr.length){ list.innerHTML='<div class="kk-empty">企画がまだありません。「🎯 狙い目ランキング」の<b>✏️ この企画で作る</b>、上の投稿動画、または「＋ 新しい企画を追加」から始めましょう。</div>'; renderMyChannel(); return; }
  list.innerHTML=arr.map(kkCard).join('');
  renderMyChannel();
}

function exportKikaku(){
  const blob=new Blob([JSON.stringify(kkLoad(),null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='kikaku_pdca_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importKikaku(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(Array.isArray(d)){ if(confirm('読み込むと現在の企画リストを置き換えます。よろしいですか？')){ kkSave(d); renderKikaku(); } } }catch(err){ alert('読み込み失敗: '+err); } };
  r.readAsText(f); e.target.value='';
}

// メインページの「この企画で作る」から渡されたチャンスを取り込む
function applyPendingOpp(){
  const raw=localStorage.getItem('yt_pending_opp'); if(!raw) return;
  localStorage.removeItem('yt_pending_opp');
  let o; try{ o=JSON.parse(raw); }catch(e){ return; }
  const arr=kkLoad(); const k=blankKikaku();
  k.target=o.label+'（平均'+Math.round((o.avg_views||0)/10000)+'万再生 / 投稿空白'+(o.gap_days||0)+'日 / 競合'+(o.total_videos||0)+'本）';
  k.refs=(o.refs||[]).map(r=>({title:r.title||'', url: r.id ? ('https://www.youtube.com/watch?v='+r.id) : ''}));
  arr.unshift(k); kkSave(arr);
}

applyPendingOpp();
seedKikaku();
renderKikaku();
</script></body></html>
